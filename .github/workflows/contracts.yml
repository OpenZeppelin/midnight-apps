name: Contracts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 2 # Recommended by turbo team

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Compile contracts (with retry on hash mismatch)
        shell: bash
        timeout-minutes: 25
        run: |
          set -euo pipefail

          compile() {
            echo "⚙️ Running Compact compilation..."
            if ! output=$(pnpm exec turbo compact --concurrency=1 2>&1); then
              echo "$output"
              echo "❌ Compilation failed."

              if echo "$output" | grep -q "Hash mismatch" && [ -d "$HOME/.cache/midnight/zk-params" ]; then
                echo "⚠️ Hash mismatch detected *and* zk-params exists. Removing cache..."
                rm -rf "$HOME/.cache/midnight/zk-params"
                echo "::notice::♻️ Retrying compilation after clearing zk-params..."
                pnpm exec turbo compact --concurrency=1 || { echo "::error::❌ Retry also failed."; exit 1; }
              else
                echo "🚫 Compilation failed for another reason or zk-params missing. No retry."
                exit 1
              fi
            else
              echo "$output"
            fi
          }

          compile

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 2 # Recommended by turbo team

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Run tests
        run: pnpm test:contracts
        timeout-minutes: 10
        env:
          SKIP_ZK: "true"

      - name: Check types
        run: pnpm types:contracts
        timeout-minutes: 5
        env:
          SKIP_ZK: "true"
